<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:transparent;
}


/* GALERÍA */

.galeria{

display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:20px;
width:90%;
max-width:1100px;
margin:auto;

}



/* TARJETA */

.tarjeta{

position:relative;

text-decoration:none;

color:white;

border-radius:12px;

overflow:hidden;

display:block;

cursor:pointer;

background:#111;

box-shadow:0 8px 20px rgba(0,0,0,.35);

transition:.3s;

}


.tarjeta:hover{

box-shadow:0 16px 36px rgba(0,0,0,.5);

}



/* ANIMACION */

.entrada{

animation:aparecer .6s ease forwards;

opacity:0;

transform:translateY(25px);

}


@keyframes aparecer{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}



/* IMAGEN */

.tarjeta img{

width:100%;

aspect-ratio:16/10;

object-fit:contain;

display:block;

background:#111;

transition:transform .45s ease;

}



.tarjeta:hover img{

transform:scale(1.06);

}



/* ETIQUETA */

.etiqueta{

position:absolute;

top:12px;

left:12px;

background:#b00000;

color:white;

font-size:12px;

font-weight:bold;

padding:7px 12px;

border-radius:6px;

z-index:20;

box-shadow:0 4px 10px rgba(0,0,0,.5);

}



/* TEXTO */

.contenido{

position:absolute;

left:0;

right:0;

bottom:0;

padding:18px 15px 15px;

background:rgba(110,0,0,.68);

backdrop-filter:blur(5px);

-webkit-backdrop-filter:blur(5px);

border-top:1px solid rgba(255,160,160,.35);

box-shadow:0 -10px 20px rgba(120,0,0,.45);

}



.titulo{

font-size:18px;

font-weight:bold;

line-height:1.2;

}



.subtitulo{

font-size:13px;

margin-top:7px;

line-height:1.35;

color:#f0f0f0;

display:-webkit-box;

-webkit-line-clamp:3;

-webkit-box-orient:vertical;

overflow:hidden;

}



/* MOVIL */

@media(max-width:700px){


.galeria{

grid-template-columns:repeat(2,minmax(0,1fr));

width:95%;

gap:12px;

}



.tarjeta{

display:flex;

flex-direction:column;

}



.tarjeta:hover img{

transform:none;

}



.tarjeta img{

aspect-ratio:16/10;

object-fit:cover;

}



.contenido{

position:static;

background:#1b1b1b;

padding:12px;

border-top:3px solid #8d0000;

box-shadow:none;

}



.titulo{

font-size:15px;

}


.subtitulo{

font-size:12px;

}


.etiqueta{

top:8px;

left:8px;

font-size:10px;

padding:5px 8px;

}


}


</style>

</head>


<body>


<div class="galeria" id="galeria"></div>



<script>


fetch("curiosidades.json")


.then(res=>res.json())


.then(datos=>{


let html="";


datos.forEach((item,index)=>{


html += `


<a href="${item.enlace}" target="_blank" class="tarjeta entrada" style="animation-delay:${index*0.25}s">


<img src="https://kastewar2000-max.github.io/archivos-del-pasado-ui/${item.imagen}" alt="${item.titulo}">


<div class="etiqueta">

💡 CURIOSIDAD

</div>


<div class="contenido">


<div class="titulo">

${item.titulo}

</div>


<div class="subtitulo">

${item.subtitulo}

</div>


</div>


</a>


`;

});


document.getElementById("galeria").innerHTML=html;


});


</script>


</body>

</html>
