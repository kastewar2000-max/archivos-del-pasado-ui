<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
margin:0;
font-family:Arial, sans-serif;
background:transparent;
}


/* GALERÍA */

.galeria {

display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:20px;
width:90%;
max-width:1100px;
margin:auto;
box-sizing:border-box;

}


/* TARJETA */

.tarjeta {

position:relative;
text-decoration:none;
color:white;
border-radius:12px;
overflow:hidden;
display:block;
transition:transform .2s;
cursor:pointer;

}


.tarjeta:hover {

transform:scale(1.015);

}


/* ANIMACIÓN ENTRADA */

.entrada {

animation:aparecer .6s ease forwards;
opacity:0;
transform:translateY(25px);

}


@keyframes aparecer {

from {

opacity:0;
transform:translateY(25px);

}

to {

opacity:1;
transform:translateY(0);

}

}


/* IMAGEN */

.tarjeta img {

width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block;

}


/* TEXTO SOBRE LA IMAGEN */

.contenido {

position:absolute;
bottom:0;
left:0;
width:100%;
box-sizing:border-box;

padding:45px 18px 18px;


background:linear-gradient(
180deg,
rgba(80,0,0,0.05),
rgba(80,0,0,0.75)
);

}


/* TITULO */

.titulo {

font-size:21px;
font-weight:bold;
line-height:1.2;

}


/* SUBTITULO */

.subtitulo {

font-size:15px;
margin-top:8px;
line-height:1.4;

}


/* MÓVIL */

@media(max-width:700px){

.galeria{

grid-template-columns:repeat(2,minmax(0,1fr));
width:95%;

}


.titulo{

font-size:16px;

}


.subtitulo{

font-size:12px;

}

}

</style>

</head>


<body>


<div class="galeria" id="galeria"></div>



<script>


fetch("curiosidades.json")


.then(res=>res.json())


.then(datos=>{


let html="";


datos.forEach((item,index)=>{


html += `


<a href="${item.enlace}" target="_blank" class="tarjeta entrada" style="animation-delay:${index*0.25}s">


<img src="https://kastewar2000-max.github.io/archivos-del-pasado-ui/${item.imagen}" alt="${item.titulo}">


<div class="contenido">


<div class="titulo">

${item.titulo}

</div>


<div class="subtitulo">

${item.subtitulo}

</div>


</div>


</a>


`;


});


document.getElementById("galeria").innerHTML=html;


});


</script>


</body>

</html>
