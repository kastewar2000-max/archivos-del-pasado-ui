<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

/* ================================
   ARCHIVOS DEL PASADO
   GALERÍA V3.0
   ================================ */


body{

margin:0;

font-family:Arial,sans-serif;

background:transparent;

}


/* ================================
   GALERÍA
   ================================ */


.galeria{

display:grid;

grid-template-columns:repeat(2,minmax(0,1fr));

gap:20px;

width:90%;

max-width:1100px;

margin:auto;

}



/* ================================
   TARJETA
   ================================ */


.tarjeta{

position:relative;

text-decoration:none;

color:white;

border-radius:12px;

overflow:hidden;

display:block;

cursor:pointer;

background:#111;

box-shadow:0 8px 20px rgba(0,0,0,.35);

transition:.3s;

}



.tarjeta:hover{

box-shadow:0 16px 36px rgba(0,0,0,.5);

}



/* ================================
   ANIMACIÓN ENTRADA
   ================================ */


.entrada{

animation:aparecer .6s ease forwards;

opacity:0;

transform:translateY(25px);

}



@keyframes aparecer{


from{

opacity:0;

transform:translateY(25px);

}


to{

opacity:1;

transform:translateY(0);

}


}



/* ================================
   IMAGEN
   ================================ */


.tarjeta img{

width:100%;

aspect-ratio:16/10;

object-fit:contain;

display:block;

background:#111;

transition:transform .45s ease;

}



.tarjeta:hover img{

transform:scale(1.06);

}



/* ================================
   PALETA DE COLORES
   (controlada desde JSON)
   ================================ */


:root{


--burdeos:#8b0000;

--panel-burdeos:rgba(110,0,0,.68);


--negro:#222;

--panel-negro:rgba(20,20,20,.70);


--azul:#0d3b66;

--panel-azul:rgba(13,59,102,.70);


--verde:#2d6a4f;

--panel-verde:rgba(45,106,79,.70);


--dorado:#8b6a00;

--panel-dorado:rgba(139,106,0,.70);


}



/* ================================
   ETIQUETA SUPERIOR
   ================================ */


.etiqueta{

position:absolute;

top:12px;

left:12px;


color:white;

font-size:12px;

font-weight:bold;

padding:7px 12px;

border-radius:6px;


z-index:20;


box-shadow:0 4px 10px rgba(0,0,0,.5);


letter-spacing:.5px;


}



/* ================================
   PANEL DE TEXTO PC
   ================================ */


.contenido{


position:absolute;


left:0;

right:0;

bottom:0;


padding:18px 15px 15px;


background:var(--panel-burdeos);


backdrop-filter:blur(5px);

-webkit-backdrop-filter:blur(5px);



border-top:1px solid rgba(255,160,160,.35);


box-shadow:0 -10px 20px rgba(120,0,0,.45);



}



/* TITULO */


.titulo{

font-size:18px;

font-weight:bold;

line-height:1.2;

}



/* SUBTITULO */


.subtitulo{

font-size:13px;

margin-top:7px;

line-height:1.35;

color:#f0f0f0;


display:-webkit-box;

-webkit-line-clamp:3;

-webkit-box-orient:vertical;

overflow:hidden;


}



/* ================================
   VERSION MOVIL
   ================================ */


@media(max-width:700px){


.galeria{


grid-template-columns:repeat(2,minmax(0,1fr));


width:95%;


gap:12px;


}



.tarjeta{


display:flex;

flex-direction:column;


}



.tarjeta:hover img{


transform:none;


}



/* etiqueta móvil */


.etiqueta{


position:static;


order:-1;


width:100%;


box-sizing:border-box;


border-radius:0;


padding:5px 8px;


font-size:10px;



box-shadow:none;


letter-spacing:.4px;


}



/* imagen móvil */


.tarjeta img{


aspect-ratio:16/10;


object-fit:cover;


}



/* panel móvil */


.contenido{


position:static;


background:#1b1b1b;


padding:12px;


border-top:3px solid var(--burdeos);


box-shadow:none;


}



.titulo{

font-size:15px;

}


.subtitulo{

font-size:12px;

line-height:1.4;

}


}


</style>

</head>


<body>


<div class="galeria" id="galeria"></div>
<script>


/* ================================
   CONFIGURACIÓN DE COLORES
   ================================ */


const colores = {


burdeos:{

etiqueta:"#8b0000",

panel:"rgba(110,0,0,.68)",

borde:"#8b0000"

},



negro:{

etiqueta:"#222222",

panel:"rgba(20,20,20,.70)",

borde:"#222222"

},



azul:{

etiqueta:"#0d3b66",

panel:"rgba(13,59,102,.70)",

borde:"#0d3b66"

},



verde:{

etiqueta:"#2d6a4f",

panel:"rgba(45,106,79,.70)",

borde:"#2d6a4f"

},



dorado:{

etiqueta:"#8b6a00",

panel:"rgba(139,106,0,.70)",

borde:"#8b6a00"

}


};




/* ================================
   CARGA DEL JSON
   ================================ */


fetch("curiosidades.json")


.then(res=>res.json())


.then(datos=>{


let html="";



datos.forEach((item,index)=>{


/* COLOR DE ETIQUETA */


let colorEtiqueta = colores[item.colorEtiqueta] || colores.burdeos;



/* COLOR DEL PANEL */


let colorPanel = colores[item.colorPanel] || colores.burdeos;




html += `



<a href="${item.enlace}" 
target="_blank" 
class="tarjeta entrada"
style="animation-delay:${index*0.25}s">





<div class="etiqueta"
style="background:${colorEtiqueta.etiqueta};">


${item.etiqueta || "💡 CURIOSIDAD"}


</div>





<img 
loading="lazy"
src="https://kastewar2000-max.github.io/archivos-del-pasado-ui/${item.imagen}" 
alt="${item.titulo}">






<div class="contenido"

style="
background:${colorPanel.panel};
border-top-color:${colorPanel.borde};
">


<div class="titulo">

${item.titulo}

</div>



<div class="subtitulo">

${item.subtitulo}

</div>



</div>





</a>


`;



});



document.getElementById("galeria").innerHTML=html;



})



.catch(error=>{


console.error("Error cargando JSON:",error);


});



</script>


</body>

</html>
