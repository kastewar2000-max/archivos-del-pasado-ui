<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
margin:0;
font-family:Arial, sans-serif;
background:transparent;
}


/* GALERÍA */

.galeria {

display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:20px;
width:90%;
max-width:1100px;
margin:auto;
box-sizing:border-box;

}


/* TARJETA */

.tarjeta {

position:relative;
text-decoration:none;
color:white;
border-radius:12px;
overflow:hidden;
display:block;
transition:transform .2s;
cursor:pointer;
background:#111;

}


.tarjeta:hover {

transform:scale(1.015);

}


/* ANIMACIÓN */

.entrada {

animation:aparecer .6s ease forwards;
opacity:0;
transform:translateY(25px);

}


@keyframes aparecer {

from {

opacity:0;
transform:translateY(25px);

}

to {

opacity:1;
transform:translateY(0);

}

}


/* IMAGEN COMPLETA */

.tarjeta img {

width:100%;
height:auto;
aspect-ratio:16/10;
object-fit:contain;
display:block;
background:#111;

}


/* TEXTO */

.contenido {

position:absolute;
bottom:0;
left:0;
right:0;

padding:35px 15px 15px;

background:linear-gradient(
transparent,
rgba(40,0,0,0.85)
);

border-radius:0 0 12px 12px;

}


/* TITULO */

.titulo {

font-size:18px;
font-weight:bold;
line-height:1.2;

}


/* SUBTITULO */

.subtitulo {

font-size:13px;
margin-top:7px;
line-height:1.3;

display:-webkit-box;
-webkit-line-clamp:3;
-webkit-box-orient:vertical;
overflow:hidden;

}


/* MÓVIL */

@media(max-width:700px){


.galeria {

grid-template-columns:repeat(2,minmax(0,1fr));
width:95%;
gap:10px;

}


.tarjeta img {

height:auto;

}


.contenido {

padding:25px 10px 10px;

}


.titulo {

font-size:14px;

}


.subtitulo {

font-size:11px;

-webkit-line-clamp:3;

}


}


</style>

</head>


<body>


<div class="galeria" id="galeria"></div>



<script>


fetch("curiosidades.json")


.then(res=>res.json())


.then(datos=>{


let html="";


datos.forEach((item,index)=>{


html += `


<a href="${item.enlace}" target="_blank" class="tarjeta entrada" style="animation-delay:${index*0.25}s">


<img src="https://kastewar2000-max.github.io/archivos-del-pasado-ui/${item.imagen}" alt="${item.titulo}">


<div class="contenido">


<div class="titulo">

${item.titulo}

</div>


<div class="subtitulo">

${item.subtitulo}

</div>


</div>


</a>


`;


});


document.getElementById("galeria").innerHTML=html;


});


</script>


</body>

</html>
