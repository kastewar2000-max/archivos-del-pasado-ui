<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
font-family:Arial,sans-serif;
background:transparent;
}


/* GALERIA */

.galeria{

display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:20px;
width:90%;
max-width:1100px;
margin:auto;

}


/* TARJETA */

.tarjeta{

position:relative;
text-decoration:none;
color:white;

border-radius:12px;

overflow:hidden;

display:block;

cursor:pointer;

background:#111;

box-shadow:0 8px 20px rgba(0,0,0,.35);

transition:.3s;

}


.tarjeta:hover{

box-shadow:0 16px 36px rgba(0,0,0,.5);

}



.entrada{

animation:aparecer .6s ease forwards;

opacity:0;

transform:translateY(25px);

}


@keyframes aparecer{

from{

opacity:0;

transform:translateY(25px);

}

to{

opacity:1;

transform:translateY(0);

}

}



/* IMAGEN */

.tarjeta img{

width:100%;

aspect-ratio:16/10;

object-fit:contain;

display:block;

background:#111;

transition:transform .45s ease;

}


.tarjeta:hover img{

transform:scale(1.06);

}




/* ETIQUETA */

.etiqueta{

position:absolute;

top:12px;

left:12px;

color:white;

font-size:12px;

font-weight:bold;

padding:7px 12px;

border-radius:6px;

z-index:20;

box-shadow:0 4px 10px rgba(0,0,0,.5);

}



/* TEXTO PC */

.contenido{

position:absolute;

left:0;

right:0;

bottom:0;

padding:18px 15px 15px;

backdrop-filter:blur(5px);

-webkit-backdrop-filter:blur(5px);

}



.titulo{

font-size:18px;

font-weight:bold;

line-height:1.2;

}


.subtitulo{

font-size:13px;

margin-top:7px;

line-height:1.35;

color:#f0f0f0;

display:-webkit-box;

-webkit-line-clamp:3;

-webkit-box-orient:vertical;

overflow:hidden;

}



/* MOVIL */

@media(max-width:700px){


.galeria{

grid-template-columns:repeat(2,minmax(0,1fr));

width:95%;

gap:12px;

}



.tarjeta:hover img{

transform:none;

}



.etiqueta{

position:static;

order:-1;

width:100%;

box-sizing:border-box;

border-radius:0;

padding:5px 8px;

font-size:10px;

box-shadow:none;

}



.tarjeta img{

aspect-ratio:16/10;

object-fit:cover;

}



.contenido{

position:static;

padding:12px;

box-shadow:none;

border-top:3px solid #8b0000;

}



.titulo{

font-size:15px;

}



.subtitulo{

font-size:12px;

}


}


</style>

</head>


<body>


<div class="galeria" id="galeria"></div>
<script>


/* ===============================
   PALETA DE COLORES
   =============================== */


const colores = {


rojo:{

etiqueta:"#8b0000",

panel:"rgba(110,0,0,.68)",

borde:"#8b0000"

},


burdeos:{

etiqueta:"#8b0000",

panel:"rgba(110,0,0,.68)",

borde:"#8b0000"

},


negro:{

etiqueta:"#222222",

panel:"rgba(20,20,20,.70)",

borde:"#222222"

},


azul:{

etiqueta:"#0d3b66",

panel:"rgba(13,59,102,.70)",

borde:"#0d3b66"

},


verde:{

etiqueta:"#2d6a4f",

panel:"rgba(45,106,79,.70)",

borde:"#2d6a4f"

},


dorado:{

etiqueta:"#8b6a00",

panel:"rgba(139,106,0,.70)",

borde:"#8b6a00"

}


};




/* ===============================
   CARGAR JSON
   =============================== */


fetch("curiosidades.json")


.then(res=>res.json())


.then(datos=>{


let html="";


datos.forEach((item,index)=>{


let colorEtiqueta = colores[item.colorEtiqueta] || colores.rojo;


let colorPanel = colores[item.colorPanel] || colores.rojo;




html += `



<a href="${item.enlace}"

target="_blank"

class="tarjeta entrada"

style="animation-delay:${index*0.25}s">






<div class="etiqueta"

style="background:${colorEtiqueta.etiqueta};">

${item.etiqueta || "💡 CURIOSIDAD"}

</div>







<img

loading="lazy"

src="https://kastewar2000-max.github.io/archivos-del-pasado-ui/${item.imagen}"

alt="${item.titulo}">







<div class="contenido"

style="

background:${colorPanel.panel};

border-top:3px solid ${colorPanel.borde};

">





<div class="titulo">

${item.titulo}

</div>





<div class="subtitulo">

${item.subtitulo}

</div>






</div>





</a>



`;



});



document.getElementById("galeria").innerHTML=html;



})


.catch(error=>{


console.error("Error cargando curiosidades.json:",error);


});



</script>


</body>

</html>
