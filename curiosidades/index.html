<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body {
margin:0;
font-family:Arial, sans-serif;
background:transparent;
}


/* GALERÍA */

.galeria {

display:grid;
grid-template-columns:repeat(2,minmax(0,1fr));
gap:15px;
width:100%;
box-sizing:border-box;

}


/* TARJETA */

.tarjeta {

text-decoration:none;
background:#111;
color:white;
border-radius:12px;
overflow:hidden;
display:block;
transition:transform .2s;

}


.tarjeta:hover {

transform:scale(1.02);

}



/* IMAGEN */

.tarjeta img {

width:100%;
aspect-ratio:16/9;
object-fit:cover;
display:block;

}


/* TEXTO */

.contenido {

padding:12px;

}


.categoria {

font-size:12px;
color:#c0c0c0;
text-transform:uppercase;
letter-spacing:1px;

}


.titulo {

font-size:18px;
font-weight:bold;
margin-top:5px;

}


.subtitulo {

font-size:14px;
margin-top:8px;
line-height:1.4;

}


.estrellas {

margin-top:8px;
color:#d4af37;

}


/* MÓVIL */

@media(max-width:700px){

.galeria{

grid-template-columns:repeat(2,minmax(0,1fr));

}

.titulo{

font-size:15px;

}

.subtitulo{

font-size:12px;

}

}

</style>

</head>


<body>


<div class="galeria" id="galeria"></div>



<script>

fetch("curiosidades.json")

.then(res=>res.json())

.then(datos=>{


let html="";


datos.forEach(item=>{


html += `


<a href="${item.enlace}" class="tarjeta">


<img src="${item.imagen}" alt="${item.titulo}">


<div class="contenido">


<div class="categoria">

${item.categoria}

</div>


<div class="titulo">

${item.titulo}

</div>


<div class="subtitulo">

${item.subtitulo}

</div>


<div class="estrellas">

${item.valoracion || ""}

</div>


</div>


</a>


`;


});


document.getElementById("galeria").innerHTML=html;


});


</script>


</body>

</html>
