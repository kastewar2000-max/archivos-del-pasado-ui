<!DOCTYPE html>
<html lang="es">

<head>

<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Archivos del Pasado</title>

<link rel="stylesheet" href="style.css">

</head>


<body>


<h1>ARCHIVOS DEL PASADO</h1>


<h2>⭐ Curiosidades históricas</h2>

<div class="grid" id="curiosidades"></div>



<h2>🎞️ Restauraciones recomendadas</h2>

<div class="grid" id="restauraciones"></div>



<script>

fetch("portada.json")

.then(res => res.json())

.then(datos => {


datos.forEach(item => {


let tarjeta = `

<a class="card" href="${item.enlace}">

<img src="${item.imagen}">

<div class="overlay">

${item.titulo}

</div>

</a>

`;



if(item.slot <= 2){

document.getElementById("curiosidades").innerHTML += tarjeta;

}

else{

document.getElementById("restauraciones").innerHTML += tarjeta;

}


});


});


</script>


</body>

</html>
